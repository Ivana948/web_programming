<!DOCTYPE html>
<html lang="en" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <title>Archaeological Site List</title>
</head>
<body>

<div>
    <!-- The form below should invoke the method ArchaeologicalSiteController.listAll -->
    <form id="filter-form" th:action="@{/archaeological-sites}" th:method="get">>
        <label for="name">Site Name</label>
        <input id="name" type="text" name="name" th:value="${name}"/>

        <label for="areaSize">Site Area Size (in square meters)</label>
        <input id="areaSize" type="number" name="areaSize" th:value="${areaSize}"/>

        <label for="rating">Rating</label>
        <input id="rating" type="number" step="0.1" min="0" max="10" name="rating" th:value="${rating}"/>

        <label for="period">Historical Period</label>
        <select id="period" name="period">
            <option value="">All</option>
            <!-- For each HistoricalPeriod you should have one <option> like below  -->
<!--            <option>[historicalPeriod]</option>-->
            <option th:each="per : ${periods}"
                    th:value="${per}"
                    th:text="${per}"
                    th:selected="${period != null && period == per}">
            </option>

        </select>

        <label for="location">SiteLocation</label>
        <select id="location" name="locationId">
            <option value="">All</option>
            <!-- For each location you should have one <option> like below  -->
<!--            <option>[location.city] , [location.country]</option>-->
            <option th:each="loc : ${locations}"
                    th:value="${loc.getId()}"
                    th:text="${loc.getCity() + ',' + loc.getCountry()}"
                    th:selected="${locationId != null && locationId == loc.getId()}">
            </option>


        </select>

        <button id="filter" type="submit">Filter</button>
    </form>

    <div>
        <!-- ArchaeologicalSiteController.showAdd -->
        <a href="/archaeological-sites/add" class="add-item" sec:authorize="hasRole('ADMIN')">Add new archaeological site</a>
    </div>

    <table>
        <tr>
            <th>Site Name</th>
            <th>Area Size</th>
            <th>Rating</th>
            <th>Historical Period</th>
            <th>SiteLocation</th>
            <th>Open/Closed</th>
            <th>Actions</th>
        </tr>
        <!-- For each archaeological site you should have one <tr> like below -->
        <tr th:each="site : ${page.getContent()}" class="item">
            <td th:text="${site.name}">[site.name]</td>
            <td th:text="${site.areaSize}">[site.areaSize]</td>
            <td th:text="${site.rating}">[site.rating]</td>
            <td th:text="${site.period}">[site.period]</td>
            <td th:text="${site.location.city + ', ' + site.location.country}">[site.location.city], [site.location.country]</td>
            <td th:text="${site.closed ? 'CLOSED' : 'OPEN'}">[site.closed] -> OPEN/CLOSED</td>
            <td>
                <!-- ArchaeologicalSiteController.edit -->
                <a th:href="@{'/archaeological-sites/edit/{id}' (id=${site.id})}" class="edit-item" sec:authorize="hasRole('ADMIN')">Edit</a>

                <!-- ArchaeologicalSiteController.delete -->
                <form th:method="post" th:action="@{'/archaeological-sites/delete/{id}' (id=${site.id})}" sec:authorize="hasRole('ADMIN')">
                    <button type="submit" class="delete-item">Delete</button>
                </form>

                <!-- ArchaeologicalSiteController.close -->
                <form th:method="post"  th:action="@{'/archaeological-sites/close/{id}' (id=${site.id})}" th:if="${!site.closed}" sec:authorize="hasRole('ADMIN')">
                    <button type="submit" class="close-item">Close</button>
                </form>

            </td>
        </tr>
    </table>
</div>

<div>
    <ul id="nav">
        <li><a href="/">Home</a></li>
        <li><a href="/login">Login</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</div>

</body>
</html>
